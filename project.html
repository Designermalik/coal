<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Mobile-First Bubble Sort Visualizer</title>
  <style>
    /* ===== MOBILE-FIRST CSS ===== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3a 50%, #2a1a4a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 15px;
      overflow-x: hidden;
      line-height: 1.5;
    }
    
    .container { 
      max-width: 100%; 
      margin: 0 auto; 
    }
    
    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 25px;
      padding: 20px 0;
    }
    
    .header h1 {
      font-size: clamp(1.8em, 5vw, 2.8em);
      background: linear-gradient(45deg, #00ff88, #00ccff, #ff6b6b);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease infinite;
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .header p {
      font-size: clamp(0.9em, 3vw, 1.1em);
      opacity: 0.9;
      max-width: 90%;
      margin: 0 auto;
    }
    
    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
      padding: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    
    input, button, select {
      flex: 1;
      min-width: 120px;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: clamp(14px, 4vw, 16px);
      background: rgba(255,255,255,0.95);
      color: #222;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
    }
    
    input[type="text"] { 
      flex-grow: 2; 
      min-width: 200px; 
    }
    
    button {
      background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(255,107,107,0.3);
    }
    
    button:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 25px rgba(255,107,107,0.5); 
    }
    
    button:active { transform: translateY(0); }
    
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
      transform: none; 
      box-shadow: none;
    }
    
    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .speed-control label {
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 500;
      white-space: nowrap;
    }
    
    input:focus, select:focus, button:focus {
      outline: 3px solid rgba(0,255,136,0.6);
      outline-offset: 2px;
    }
    
    /* ===== BARS CONTAINER ===== */
    #bars {
      display: flex;
      justify-content: center;
      align-items: end;
      gap: clamp(1px, 0.5vw, 3px);
      min-height: clamp(250px, 50vw, 450px);
      padding: 25px 15px;
      background: rgba(0,0,0,0.4);
      border-radius: 25px;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      position: relative;
    }
    
    /* ===== BAR STYLES ===== */
    .bar {
      flex: 1;
      min-width: clamp(25px, 6vw, 50px);
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 70%, rgba(0,242,254,0.8) 100%);
      border-radius: 6px 6px 0 0;
      display: flex;
      align-items: end;
      justify-content: center;
      font-size: clamp(9px, 2.5vw, 12px);
      font-weight: 700;
      color: #000;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .bar::after {
      content: attr(data-value);
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(10px, 2.8vw, 13px);
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .bar:hover::after { opacity: 1; }
    
    .bar.active {
      background: linear-gradient(180deg, #ff6b6b 0%, #ffa500 70%, rgba(255,165,0,0.9) 100%);
      transform: scale(1.08) translateY(-5px);
      box-shadow: 0 8px 30px rgba(255,107,107,0.6);
      z-index: 10;
    }
    
    .bar.sorted {
      background: linear-gradient(180deg, #00ff88 0%, #00cc66 70%, rgba(0,204,102,0.9) 100%);
      animation: sortedGlow 1.2s ease-out;
      box-shadow: 0 6px 25px rgba(0,255,136,0.5);
    }
    
    @keyframes sortedGlow {
      0%, 100% { 
        box-shadow: 0 4px 15px rgba(0,255,136,0.4); 
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 12px 40px rgba(0,255,136,0.8); 
        transform: scale(1.03);
      }
    }
    
    /* ===== INFO PANEL ===== */
    .info-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    
    @media (min-width: 768px) {
      .info-panel { 
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      }
    }
    
    .info-card {
      background: rgba(255,255,255,0.08);
      padding: 25px 20px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      transition: transform 0.3s ease;
    }
    
    .info-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
    }
    
    .status {
      font-size: clamp(1.1em, 4vw, 1.4em);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(45deg, #00ff88, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* ===== BUTTON STATES ===== */
    .pause-btn.paused {
      background: linear-gradient(45deg, #ffa500, #ff6b6b);
      box-shadow: 0 4px 15px rgba(255,165,0,0.4);
    }
    
    .pause-btn.paused:hover {
      box-shadow: 0 8px 25px rgba(255,165,0,0.6);
    }
    
    /* ===== PERFECT MOBILE TOUCH ===== */
    @media (hover: none) and (pointer: coarse) {
      button:active { 
        transform: scale(0.98); 
      }
      .bar.active { transform: scale(1.03); }
    }
    
    /* ===== LANDSCAPE MOBILE ===== */
    @media (max-height: 500px) and (orientation: landscape) {
      .controls { flex-direction: row; flex-wrap: wrap; gap: 8px; }
      .control-row { flex-direction: column; }
      #bars { min-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🔥 Bubble Sort Magic</h1>
      <p>Watch assembly-style CMP + SWAP in action! ✨ Works perfectly on mobile</p>
    </div>
    
    <!-- Controls -->
    <div class="controls">
      <div class="control-row">
        <input type="text" id="input" placeholder="1,64,23,12,45" maxlength="100">
        <button onclick="generateArray()">🎲 New Array</button>
      </div>
      <div class="control-row">
        <button id="startBtn" onclick="startSort()">🚀 Sort Now</button>
        <button id="pauseBtn" class="pause-btn" onclick="pauseSort()">⏸️ Pause</button>
      </div>
      <div class="control-row">
        <div class="speed-control">
          <label>Speed:</label>
          <input type="range" id="speed" min="30" max="400" value="120">
          <span id="speedValue">120ms</span>
        </div>
      </div>
    </div>
    
    <!-- Visualization -->
    <div id="bars"></div>
    
    <!-- Info -->
    <div class="info-panel">
      <div class="info-card">
        <div class="status" id="passInfo">Pass: 0</div>
        <div id="logicInfo">👆 Tap "Sort Now" to begin!</div>
        <div id="compInfo" style="font-size: 0.9em; opacity: 0.8; margin-top: 8px;">Comparisons: 0</div>
      </div>
      <div class="info-card">
        <div class="status" id="arrayInfo">Array: []</div>
        <div style="font-size: 0.95em;">
          Size: <span id="sizeInfo" style="font-weight: 700; color: #00ff88;">0</span>
        </div>
        <div style="font-size: 0.95em; margin-top: 5px;">
          Status: <span id="statusInfo" style="font-weight: 700;">Ready</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let array = [];
    let isPaused = false;
    let isSorting = false;
    let comparisonCount = 0;

    // 🛡️ Safe DOM utilities
    const elements = {};
    function getElement(id) {
      if (!elements[id]) {
        elements[id] = document.getElementById(id);
        if (!elements[id]) throw new Error(`Element "${id}" not found`);
      }
      return elements[id];
    }

    // 🎮 Perfect input validation
    function parseArray(input) {
      if (!input?.trim()) {
        return Array.from({length: Math.floor(Math.random() * 8) + 6}, 
                         () => Math.floor(Math.random() * 70) + 25);
      }
      
      const numbers = input.split(/[\s,]+/)
                           .map(s => parseInt(s.trim()))
                           .filter(n => !isNaN(n) && n > 0 && n <= 120);
      
      if (numbers.length < 3 || numbers.length > 20) {
        showToast(`Use 3-20 numbers (got ${numbers.length})`, 'warning');
        return null;
      }
      return numbers;
    }

    // 📱 Perfect mobile toast
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed; top: 20px; right: 20px; z-index: 1000;
        padding: 12px 20px; border-radius: 10px; color: white;
        font-weight: 500; max-width: 90vw;
        background: ${type === 'warning' ? '#ff6b6b' : '#00ccff'};
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        transform: translateX(100%); transition: all 0.3s;
      `;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.style.transform = 'translateX(0)', 100);
      setTimeout(() => {
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // 🎨 Perfect rendering
    function draw() {
      const container = getElement('bars');
      container.innerHTML = '';
      
      array.forEach((value, index) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = `${Math.max(value * 3, 30)}px`;
        bar.dataset.value = value;
        bar.dataset.index = index;
        container.appendChild(bar);
      });
      
      updateInfo();
    }

    // 📊 Live info updates
    function updateInfo() {
      getElement('arrayInfo').textContent = `Array: [${array.slice(0, 8).join(', ')}${array.length > 8 ? '...' : ''}]`;
      getElement('sizeInfo').textContent = array.length;
      getElement('statusInfo').textContent = isSorting ? (isPaused ? '⏸️ Paused' : '🔄 Sorting') : '✅ Ready';
    }

    // 🎚️ Speed display
    getElement('speed').addEventListener('input', (e) => {
      getElement('speedValue').textContent = e.target.value + 'ms';
    });

    // ⏱️ Animation timing
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ⏸️ Perfect pause/resume
    async function checkPause() {
      while (isPaused && isSorting) await sleep(30);
    }

    function pauseSort() {
      const btn = getElement('pauseBtn');
      isPaused = !isPaused;
      btn.textContent = isPaused ? '▶️ Resume' : '⏸️ Pause';
      btn.classList.toggle('paused', isPaused);
      getElement('statusInfo').textContent = isPaused ? '⏸️ Paused' : '🔄 Sorting';
    }

    // 🔥 Perfect bubble sort
    async function bubbleSort() {
      const n = array.length;
      comparisonCount = 0;
      
      for (let pass = 1; pass < n; pass++) {
        getElement('passInfo').textContent = `Pass ${pass}/${n-1}`;
        
        for (let i = 0; i < n - pass; i++) {
          await checkPause();
          
          const delay = parseInt(getElement('speed').value);
          const bars = document.querySelectorAll('.bar');
          
          // Visual comparison
          bars[i].classList.add('active');
          bars[i + 1].classList.add('active');
          
          await sleep(delay);
          
          // Assembly-style CMP + SWAP
          comparisonCount++;
          getElement('compInfo').textContent = `Comparisons: ${comparisonCount}`;
          
          if (array[i] > array[i + 1]) {
            getElement('logicInfo').textContent = `🔄 SWAP: ${array[i]} ↔ ${array[i + 1]}`;
            [array[i], array[i + 1]] = [array[i + 1], array[i]];
            
            // Lightning-fast DOM update
            bars[i].style.height = `${array[i] * 3}px`;
            bars[i + 1].style.height = `${array[i + 1] * 3}px`;
            
            await sleep(delay * 0.6);
          } else {
            getElement('logicInfo').textContent = `✅ ${array[i]} ≤ ${array[i + 1]}`;
          }
          
          bars[i].classList.remove('active');
          bars[i + 1].classList.remove('active');
        }
        
        // Mark sorted
        document.querySelectorAll('.bar')[n - pass].classList.add('sorted');
        await sleep(150);
      }
      
      // Victory!
      document.querySelectorAll('.bar').forEach(bar => bar.classList.add('sorted'));
      getElement('logicInfo').textContent = `🎉 COMPLETE! ${comparisonCount} comparisons`;
      showToast('Sorting Complete! 🎊', 'success');
    }

    // 🎯 Main functions
    function generateArray() {
      if (isSorting) {
        showToast('Finish current sort first!', 'warning');
        return;
      }
      
      try {
        const input = getElement('input').value;
        const result = parseArray(input);
        if (result) {
          array = result;
          draw();
          getElement('logicInfo').textContent = `📦 Array loaded (${array.length} elements)`;
          showToast(`Generated array of ${array.length} elements!`);
        }
      } catch (e) {
        showToast(e.message, 'warning');
      }
    }

    async function startSort() {
      if (isSorting || array.length < 2) {
        showToast('Generate array with 2+ elements first!');
        return;
      }
      
      isSorting = true;
      isPaused = false;
      comparisonCount = 0;
      
      const startBtn = getElement('startBtn');
      const pauseBtn = getElement('pauseBtn');
      
      startBtn.disabled = true;
      startBtn.textContent = 'Sorting...';
      pauseBtn.classList.remove('paused');
      pauseBtn.textContent = '⏸️ Pause';
      
      try {
        await bubbleSort();
      } finally {
        isSorting = false;
        startBtn.disabled = false;
        startBtn.textContent = '🔄 New Sort';
        getElement('statusInfo').textContent = '✅ Ready';
      }
    }

    // 🎉 Auto-start with random array
    generateArray();
  </script>
</body>
</html>
